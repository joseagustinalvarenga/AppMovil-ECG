<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- OpenCV.js para procesamiento de imágenes -->
    <script async src="https://cdn.jsdelivr.net/npm/opencv.js@4.1.0/opencv.js"></script>
    <script>
      window.addEventListener('error', function(e) {
        var errDiv = document.createElement('div');
        errDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:white;color:red;z-index:9999;padding:20px;overflow:auto;font-family:sans-serif;';
        errDiv.innerHTML = '<h3>CRASH LOG:</h3><p><strong>Msg:</strong> ' + e.message + '</p><p><strong>File:</strong> ' + e.filename + ' (Line: ' + e.lineno + ')</p><pre style="font-size:10px;">' + (e.error ? e.error.stack : '') + '</pre>';
        document.body.appendChild(errDiv);
      });
    </script>
    <title>Vite + React + TS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
